<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Планувальник завдань</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-100 h-screen flex overflow-hidden font-sans">

    <aside class="w-1/4 bg-white shadow-xl flex flex-col">
        <div class="p-6 bg-blue-600 text-white">
            <h1 class="text-2xl font-bold">Мої Проєкти</h1>
            <p class="text-blue-200 text-sm mt-1">Оберіть проєкт для перегляду завдань</p>
        </div>

        <div class="p-4">
            <button onclick="openModal('projectModal')" class="w-full bg-blue-50 text-blue-600 border border-blue-200 hover:bg-blue-100 font-semibold py-2 px-4 rounded-lg transition-colors">
                + Новий проєкт
            </button>
        </div>

        <ul id="projectsList" class="flex-1 overflow-y-auto p-4 space-y-2">
        </ul>
    </aside>

    <main class="flex-1 flex flex-col h-screen">
        <header class="bg-white shadow-sm p-6 flex justify-between items-center z-10">
            <div>
                <h2 id="currentProjectTitle" class="text-2xl font-bold text-gray-800">Оберіть проєкт зліва</h2>
                <p id="currentProjectDesc" class="text-gray-500 mt-1"></p>
            </div>
            <button id="btnAddTask" onclick="openModal('taskModal')" class="hidden bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg shadow-md transition-colors">
                + Додати завдання
            </button>
        </header>

        <div id="kanbanBoard" class="flex-1 p-6 flex gap-6 overflow-x-auto hidden">
            <div class="flex-1 bg-gray-50 rounded-xl p-4 flex flex-col shadow-inner min-w-[300px]">
                <h3 class="font-bold text-gray-700 mb-4 flex items-center"><span class="w-3 h-3 rounded-full bg-gray-400 mr-2"></span>Не розпочате</h3>
                <div id="tasks-status-0" class="flex-1 space-y-3 overflow-y-auto pb-4"></div>
            </div>

            <div class="flex-1 bg-blue-50 rounded-xl p-4 flex flex-col shadow-inner min-w-[300px]">
                <h3 class="font-bold text-blue-700 mb-4 flex items-center"><span class="w-3 h-3 rounded-full bg-blue-500 mr-2"></span>У виконанні</h3>
                <div id="tasks-status-1" class="flex-1 space-y-3 overflow-y-auto pb-4"></div>
            </div>

            <div class="flex-1 bg-green-50 rounded-xl p-4 flex flex-col shadow-inner min-w-[300px]">
                <h3 class="font-bold text-green-700 mb-4 flex items-center"><span class="w-3 h-3 rounded-full bg-green-500 mr-2"></span>Завершене</h3>
                <div id="tasks-status-2" class="flex-1 space-y-3 overflow-y-auto pb-4"></div>
            </div>
        </div>

        <div id="noProjectSelectedMsg" class="flex-1 flex items-center justify-center text-gray-400 text-lg">
            👈 Будь ласка, оберіть проєкт зі списку ліворуч або створіть новий
        </div>
    </main>

    <div id="projectModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-2xl p-6 w-96">
            <h2 class="text-xl font-bold mb-4">Новий проєкт</h2>
            <form id="formCreateProject" onsubmit="createProject(event)">
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Назва</label>
                    <input type="text" id="projName" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="mb-6">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Опис</label>
                    <textarea id="projDesc" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                </div>
                <div class="flex justify-end gap-2">
                    <button type="button" onclick="closeModal('projectModal')" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg">Скасувати</button>
                    <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Зберегти</button>
                </div>
            </form>
        </div>
    </div>

    <div id="taskModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-2xl p-6 w-[28rem]">
            <h2 id="taskModalTitle" class="text-xl font-bold mb-4">Нове завдання</h2>
            <form id="formTask" onsubmit="saveTask(event)">
                <input type="hidden" id="taskId">
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Назва завдання</label>
                    <input type="text" id="taskTitle" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Опис</label>
                    <textarea id="taskDesc" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                </div>
                <div class="mb-6">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Пріоритет</label>
                    <select id="taskPriority" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="0">Низький</option>
                        <option value="1" selected>Середній</option>
                        <option value="2">Високий</option>
                    </select>
                </div>
                <div class="flex justify-end gap-2">
                    <button type="button" onclick="closeModal('taskModal')" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg">Скасувати</button>
                    <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Зберегти</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
