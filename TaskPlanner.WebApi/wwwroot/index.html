<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskPlanner</title>
    <!-- Inter — сучасний шрифт, той самий що у Claude -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!--
    ╔══════════════════════════════════════════════╗
    ║  ГОЛОВНИЙ МАКЕТ: сітка з двох колонок        ║
    ║  [Бокова панель 272px] [Основний вміст 1fr]  ║
    ╚══════════════════════════════════════════════╝
    -->
    <div class="app-layout">

        <!-- ══════════════════════════════════════
             БОКОВА ПАНЕЛЬ — список проєктів
             ══════════════════════════════════════ -->
        <aside class="sidebar" role="navigation" aria-label="Список проєктів">

            <!-- Логотип застосунку -->
            <div class="sidebar-header">
                <div class="app-logo">
                    <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="2" aria-hidden="true">
                        <rect x="3" y="3" width="7" height="7" rx="1.5" />
                        <rect x="14" y="3" width="7" height="7" rx="1.5" />
                        <rect x="3" y="14" width="7" height="7" rx="1.5" />
                        <rect x="14" y="14" width="7" height="7" rx="1.5" />
                    </svg>
                    <span class="app-name">TaskPlanner</span>
                </div>
            </div>

            <!-- Кнопка створення нового проєкту -->
            <div class="sidebar-actions">
                <button class="btn-new-project" onclick="openModal('project')"
                        aria-label="Створити новий проєкт">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="2.5" width="15" height="15" aria-hidden="true">
                        <path d="M12 5v14M5 12h14" />
                    </svg>
                    Новий проєкт
                </button>
            </div>

            <!-- Список проєктів (динамічно заповнюється з JS) -->
            <nav class="project-nav">
                <p class="nav-section-label">Проєкти</p>
                <ul id="projects-list" class="projects-list" role="list">
                    <!-- Елементи вставляються через renderProjects() -->
                </ul>
            </nav>

        </aside>


        <!-- ══════════════════════════════════════
             ОСНОВНИЙ ВМІСТ — канбан-дошка
             ══════════════════════════════════════ -->
        <main class="main-content" role="main">

            <!-- Верхня панель: назва поточного проєкту + кнопка додавання завдання -->
            <header class="topbar">
                <div class="topbar-info" style="flex: 1;">
                    <h1 id="current-project-title" class="project-title">Оберіть проєкт</h1>
                    <p id="current-project-desc" class="project-desc"></p>
                </div>

                <div class="search-wrapper" style="position: relative; flex: 1; max-width: 300px; margin-right: 16px;">
                    <input type="search" id="global-search" class="form-input"
                           placeholder="🔍 Знайти завдання..."
                           autocomplete="off" oninput="handleGlobalSearch(event)"
                           style="border-radius: 20px; padding: 7px 16px;">
                    <div id="search-results" class="search-dropdown hidden"></div>
                </div>

                <div style="display: flex; gap: 8px; align-items: center;">
                    <button id="btn-add-task" class="btn-primary hidden"
                            onclick="openModal('task')" aria-label="Додати нове завдання">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                             stroke-width="2.5" width="15" height="15" aria-hidden="true">
                            <path d="M12 5v14M5 12h14" />
                        </svg>
                        Додати завдання
                    </button>
                    <button id="btn-close-board" class="btn-ghost hidden" onclick="closeBoard()"
                            title="Закрити дошку" style="padding: 9px; min-width: auto;">
                        ✕
                    </button>
                </div>
            </header>

            <!-- Порожній стан: показується коли жоден проєкт не обрано -->
            <div id="empty-state" class="empty-state" role="status">
                <div class="empty-state-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                         width="28" height="28">
                        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2" />
                        <rect x="9" y="3" width="6" height="4" rx="1" />
                        <path d="M9 12h6M9 16h4" />
                    </svg>
                </div>
                <h2 class="empty-state-title">Проєкт не обрано</h2>
                <p class="empty-state-text">
                    Оберіть проєкт зі списку ліворуч або створіть новий, щоб почати планування
                </p>
                <button class="btn-primary" onclick="openModal('project')">
                    Створити перший проєкт
                </button>
            </div>

            <!-- Канбан-дошка: три колонки за статусом завдань -->
            <div id="kanban-board" class="kanban-board hidden" role="region"
                 aria-label="Канбан-дошка завдань">

                <!-- Колонка 1: Не розпочато -->
                <div class="kanban-column">
                    <div class="column-header">
                        <div class="column-header-left">
                            <span class="column-dot dot-neutral" aria-hidden="true"></span>
                            <h2 class="column-title">Не розпочато</h2>
                        </div>
                        <span class="column-badge" id="count-0" aria-label="кількість завдань">0</span>
                    </div>
                    <div class="column-body drop-zone" id="tasks-status-0"
                         role="list" aria-label="Завдання «Не розпочато»"
                         ondragover="handleDragOver(event)"
                         ondragleave="handleDragLeave(event)"
                         ondrop="handleDrop(event, 0)">
                    </div>
                </div>

                <!-- Колонка 2: У виконанні -->
                <div class="kanban-column">
                    <div class="column-header">
                        <div class="column-header-left">
                            <span class="column-dot dot-sage" aria-hidden="true"></span>
                            <h2 class="column-title">У виконанні</h2>
                        </div>
                        <span class="column-badge column-badge--sage" id="count-1"
                              aria-label="кількість завдань">0</span>
                    </div>
                    <div class="column-body drop-zone" id="tasks-status-1"
                         role="list" aria-label="Завдання «У виконанні»"
                         ondragover="handleDragOver(event)"
                         ondragleave="handleDragLeave(event)"
                         ondrop="handleDrop(event, 1)">
                    </div>
                </div>

                <!-- Колонка 3: Завершено -->
                <div class="kanban-column">
                    <div class="column-header">
                        <div class="column-header-left">
                            <span class="column-dot dot-burgundy" aria-hidden="true"></span>
                            <h2 class="column-title">Завершено</h2>
                        </div>
                        <span class="column-badge column-badge--burgundy" id="count-2"
                              aria-label="кількість завдань">0</span>
                    </div>
                    <div class="column-body drop-zone" id="tasks-status-2"
                         role="list" aria-label="Завдання «Завершено»"
                         ondragover="handleDragOver(event)"
                         ondragleave="handleDragLeave(event)"
                         ondrop="handleDrop(event, 2)">
                    </div>
                </div>

            </div><!-- /.kanban-board -->

        </main>
    </div><!-- /.app-layout -->
    <!--
    ╔══════════════════════════════════════════════╗
    ║  МОДАЛЬНЕ ВІКНО: Новий проєкт               ║
    ╚══════════════════════════════════════════════╝
    -->
    <input type="hidden" id="proj-id">
    <div id="modal-project" class="modal-overlay hidden"
         role="dialog" aria-modal="true" aria-labelledby="modal-project-heading"
         onclick="closeModalOnOverlay(event, 'project')">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modal-project-heading" class="modal-title">Новий проєкт</h2>
                <button class="modal-close-btn" onclick="closeModal('project')"
                        aria-label="Закрити">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="2" width="18" height="18" aria-hidden="true">
                        <path d="M18 6L6 18M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label" for="proj-name">
                        Назва проєкту
                    </label>
                    <input type="text" id="proj-name" class="form-input"
                           placeholder="Наприклад: Редизайн сайту" maxlength="100"
                           autocomplete="off">
                </div>
                <div class="form-group">
                    <label class="form-label" for="proj-desc">
                        Опис
                        <span class="form-label-hint">(необов'язково)</span>
                    </label>
                    <textarea id="proj-desc" class="form-textarea" rows="3"
                              placeholder="Короткий опис мети проєкту..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-ghost" onclick="closeModal('project')">
                    Скасувати
                </button>
                <button class="btn-primary" onclick="handleCreateProject()">
                    Створити
                </button>
            </div>
        </div>
    </div>


    <!--
    ╔══════════════════════════════════════════════╗
    ║  МОДАЛЬНЕ ВІКНО: Нове / редагувати завдання ║
    ╚══════════════════════════════════════════════╝
    -->
    <div id="modal-task" class="modal-overlay hidden"
         role="dialog" aria-modal="true" aria-labelledby="modal-task-heading"
         onclick="closeModalOnOverlay(event, 'task')">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modal-task-heading" class="modal-title">Нове завдання</h2>
                <button class="modal-close-btn" onclick="closeModal('task')"
                        aria-label="Закрити">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="2" width="18" height="18" aria-hidden="true">
                        <path d="M18 6L6 18M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div class="modal-body">

                <!-- Прихований ID (заповнюється при редагуванні) -->
                <input type="hidden" id="task-id">

                <div class="form-group">
                    <label class="form-label" for="task-title">
                        Назва завдання
                    </label>
                    <input type="text" id="task-title" class="form-input"
                           placeholder="Що потрібно зробити?" maxlength="200"
                           autocomplete="off">
                </div>

                <div class="form-group">
                    <label class="form-label" for="task-desc">
                        Опис
                        <span class="form-label-hint">(необов'язково)</span>
                    </label>
                    <textarea id="task-desc" class="form-textarea" rows="3"
                              placeholder="Деталі, посилання, нотатки..."></textarea>
                </div>

                <div class="form-group">
                    <p class="form-label">Пріоритет</p>
                    <div class="priority-selector" role="radiogroup"
                         aria-label="Оберіть пріоритет">
                        <button class="priority-btn" data-value="0"
                                onclick="selectPriority(0)"
                                role="radio" aria-checked="false">
                            <span class="priority-dot priority-dot--low" aria-hidden="true"></span>
                            Низький
                        </button>
                        <button class="priority-btn priority-btn--active" data-value="1"
                                onclick="selectPriority(1)"
                                role="radio" aria-checked="true">
                            <span class="priority-dot priority-dot--medium" aria-hidden="true"></span>
                            Середній
                        </button>
                        <button class="priority-btn" data-value="2"
                                onclick="selectPriority(2)"
                                role="radio" aria-checked="false">
                            <span class="priority-dot priority-dot--high" aria-hidden="true"></span>
                            Високий
                        </button>
                    </div>
                    <!-- Прихований input зберігає обране числове значення -->
                    <input type="hidden" id="task-priority" value="1">
                </div>

            </div>
            <div class="modal-footer">
                <button class="btn-ghost" onclick="closeModal('task')">
                    Скасувати
                </button>
                <button class="btn-primary" onclick="handleSaveTask()">
                    Зберегти
                </button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
